name: Veille quotidienne

on:
  schedule:
    # 10h UTC (12h Paris été / 11h Paris hiver) — après les publications asiatiques et européennes du matin
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Reprendre un run existant (laisser vide pour nouveau run)'
        required: false
        default: ''
      skip_to:
        description: 'Sauter directement à une phase (extract|score|recap-articles|recap-global)'
        required: false
        default: 'extract'
        type: choice
        options: ['extract', 'score', 'recap-articles', 'recap-global']

jobs:
  # ── Job 1 : Extraction + filtre garde-fou ─────────────────────────────────
  extract:
    name: '1 · Extract'
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.extract.outputs.run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run extraction
        id: extract
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EXISTING_RUN_ID: ${{ github.event.inputs.run_id }}
          SKIP_TO: ${{ github.event.inputs.skip_to }}
        run: |
          RUN_ID=$(npx ts-node --project tsconfig.scripts.json scripts/veille/extract.ts)
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "Extraction terminée — run_id=${RUN_ID}"

  # ── Job 2 : Scoring sémantique ────────────────────────────────────────────
  score:
    name: '2 · Score'
    needs: extract
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scoring
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_ID: ${{ needs.extract.outputs.run_id }}
        run: |
          echo "Scoring run_id=${RUN_ID}"
          npx ts-node --project tsconfig.scripts.json scripts/veille/score.ts

  # ── Job 3 : Récap IA par article ──────────────────────────────────────────
  recap-articles:
    name: '3 · Récap articles'
    needs: [extract, score]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run article recaps
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RUN_ID: ${{ needs.extract.outputs.run_id }}
        run: |
          echo "Récap articles run_id=${RUN_ID}"
          npx ts-node --project tsconfig.scripts.json scripts/veille/recap-articles.ts

  # ── Job 4 : Récap IA global ───────────────────────────────────────────────
  recap-global:
    name: '4 · Récap global'
    needs: [extract, recap-articles]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run global recap
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RUN_ID: ${{ needs.extract.outputs.run_id }}
        run: |
          echo "Récap global run_id=${RUN_ID}"
          npx ts-node --project tsconfig.scripts.json scripts/veille/recap-global.ts
