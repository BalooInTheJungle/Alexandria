name: Veille quotidienne

on:
  schedule:
    # 13h Paris (UTC+2 en été) — 1er run d'extraction
    - cron: '0 11 * * *'
    # 14h Paris (UTC+2 en été) — 2ème run d'extraction
    - cron: '0 12 * * *'
    # 15h Paris (UTC+2 en été) — 3ème run d'extraction
    - cron: '0 13 * * *'
    # 16h Paris (UTC+2 en été) — résumé IA consolidé (après les 3 runs d'extraction)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      daily_summary:
        description: 'Générer le résumé IA consolidé du jour'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  run-veille:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher le pipeline veille
        run: |
          # 4ème run (14h UTC = 16h Paris) → résumé IA consolidé sur tous les articles du jour
          HOUR=$(date -u +%-H)
          DAILY_SUMMARY="false"
          if [ "$HOUR" = "14" ]; then
            DAILY_SUMMARY="true"
          fi
          # workflow_dispatch override
          if [ "${{ github.event.inputs.daily_summary }}" = "true" ]; then
            DAILY_SUMMARY="true"
          fi

          echo "daily_summary=${DAILY_SUMMARY}"

          response=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/cron/veille?daily_summary=${DAILY_SUMMARY}")

          echo "HTTP status: $response"

          if [ "$response" != "200" ]; then
            echo "Erreur : le pipeline veille a retourné HTTP $response"
            exit 1
          fi

          echo "Pipeline veille démarré avec succès (daily_summary=${DAILY_SUMMARY})"
