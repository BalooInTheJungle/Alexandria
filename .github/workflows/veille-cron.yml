name: Veille quotidienne

on:
  schedule:
    # 6h Paris (UTC+2 en été) — publications asiatiques
    - cron: '0 4 * * *'
    # 14h Paris (UTC+2 en été) — publications européennes
    - cron: '0 12 * * *'
    # 22h Paris (UTC+2 en été) — publications américaines
    - cron: '0 20 * * *'
  workflow_dispatch: # permet de lancer manuellement depuis GitHub

jobs:
  run-veille:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher le pipeline veille
        run: |
          response=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/cron/veille")

          echo "HTTP status: $response"

          if [ "$response" != "200" ]; then
            echo "Erreur : le pipeline veille a retourné HTTP $response"
            exit 1
          fi

          echo "Pipeline veille démarré avec succès"
